<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SUTYA X banner image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120B22"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="50%" stop-color="#80ECFF"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <circle cx="120" cy="430" r="190" fill="#14F195" opacity="0.12" filter="url(#blur)"/>
  <circle cx="1310" cy="70" r="170" fill="#D8B4FE" opacity="0.16" filter="url(#blur)"/>

  <g opacity="0.9">
    <rect x="900" y="120" width="420" height="38" rx="14" fill="url(#sol)" transform="skewX(-18)"/>
    <rect x="960" y="198" width="420" height="38" rx="14" fill="url(#sol)" transform="skewX(-18)"/>
    <rect x="900" y="276" width="420" height="38" rx="14" fill="url(#sol)" transform="skewX(-18)"/>
  </g>

  <g transform="translate(120 95)">
    <circle cx="170" cy="155" r="120" fill="#FDE68A"/>
    <circle cx="125" cy="135" r="18" fill="#111827"/>
    <circle cx="217" cy="135" r="18" fill="#111827"/>
    <polygon points="170,165 228,188 170,214 112,188" fill="#FB923C"/>
  </g>

  <text x="570" y="210" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="800" fill="#FFFFFF">$SUTYA</text>
  <text x="570" y="286" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="600" fill="#D8B4FE">Solana Community Token</text>

  <rect x="568" y="326" width="385" height="66" rx="33" fill="#0F172A" opacity="0.85"/>
  <rect x="574" y="332" width="373" height="54" rx="27" fill="none" stroke="url(#sol)" stroke-width="2"/>
  <text x="760" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">@Sutyacoin</text>
</svg>
